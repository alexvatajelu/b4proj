<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>avcol</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="js/p5.js"></script>
    
</head>
<body>
    <div id="controls">
        <input type="file" id="folderInput" webkitdirectory directory multiple accept=".jpg,.jpeg" />
        <button id="avgColorBtn" style="display: none; margin-top: 10px; padding: 10px 15px; background: #333; color: white; border: none; border-radius: 4px; cursor: pointer; width: 100%;">Get Average Color</button>
        <button id="generateStripBtn" style="display: none; margin-top: 10px; padding: 10px 15px; background: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; width: 100%;">Generate Color Strip</button>
        <button id="exportStripBtn" style="display: none; margin-top: 10px; padding: 10px 15px; background: #28a745; color: white; border: none; border-radius: 4px; cursor: pointer; width: 100%;">Export Strips</button>
        <label style="display:block; margin-top:8px; font-size:14px;"><input type="checkbox" id="ignoreWhite" /> Ignore white-ish pixels</label>
        <div id="imageList"></div>
    </div>
    <script src="sketch.js"></script>
</body>
</html>
