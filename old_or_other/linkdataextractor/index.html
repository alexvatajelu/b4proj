<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Sketch</title>

    <link rel="stylesheet" type="text/css" href="style.css">

    <script src="libraries/p5.min.js"></script>
    <script src="libraries/p5.sound.min.js"></script>
  </head>

  <body>
    <div id="controls">
        <div style="margin-top: 20px; border-top: 1px solid #ccc; padding-top: 20px;">
          <a href="otherpage.html">other page</a>
        </div>
        <div style="margin-top: 20px; border-top: 1px solid #ccc; padding-top: 20px;">
          <input type="file" id="folderInput" webkitdirectory directory multiple accept=".jpg,.jpeg" />
          <button id="button1" style="display: none; margin-top: 10px; padding: 10px 15px; background: #333; color: white; border: none; border-radius: 4px; cursor: pointer; width: 100%;">Button 1</button>
        </div>
        <div style="margin-top: 20px; border-top: 1px solid #ccc; padding-top: 20px;">
            <label for="urlInput">Fetch URL:</label>
            <input type="text" id="urlInput" placeholder="url input" style="width: 100%; padding: 10px; margin-top: 5px; margin-bottom: 10px; border: 1px solid #999; border-radius: 4px; box-sizing: border-box; font-size: 14px;">
            <button id="fetchButton" style="padding: 10px 15px; background: #333; color: white; border: none; border-radius: 4px; cursor: pointer; width: 100%;">Fetch HTML</button>
            
            <label for="outputBox" style="display: block; margin-top: 15px;">Output:</label>
            <textarea id="outputBox" readonly style="width: 100%; height: 300px; padding: 10px; margin-top: 5px; border: 1px solid #999; border-radius: 4px; font-family: monospace; font-size: 12px; box-sizing: border-box; background: #f5f5f5;"></textarea>
            <a href="otherpage.html">other page</a>
        </div>
    </div>
    <script src="sketch.js"></script>
  </body>
</html>
